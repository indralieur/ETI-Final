<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETI Final | Assessment Platform</title>
    <!-- Plus Jakarta Sans Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* UI SECTION: CSS Styles */
        :root {
            /* Monochrome Dark Mode (Default) */
            --bg: #000000;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border: #222222;
            --accent: #ffffff;
            --accent-inverse: #000000;
            --success: #ffffff; /* Monochrome success: filled white */
            --error: #444444;   /* Monochrome error: dark grey */
        }

        body.light-mode {
            --bg: #ffffff;
            --card-bg: #f5f5f5;
            --text-main: #000000;
            --text-muted: #666666;
            --border: #e5e5e5;
            --accent: #000000;
            --accent-inverse: #ffffff;
            --success: #000000;
            --error: #cccccc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        header {
            display: flex;
            flex-direction: column;
            margin-bottom: 3rem;
            position: relative;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .theme-toggle {
            position: absolute;
            right: 0;
            top: 0;
            background: none;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Unit Navigation */
        .unit-nav {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
            scrollbar-width: none;
        }

        .unit-nav::-webkit-scrollbar { display: none; }

        .unit-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 4px 0;
            cursor: pointer;
            white-space: nowrap;
            font-weight: 500;
            font-size: 0.85rem;
            position: relative;
        }

        .unit-btn.active {
            color: var(--text-main);
        }

        .unit-btn.active::after {
            content: '';
            position: absolute;
            bottom: -13px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--text-main);
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg);
            padding: 15px;
            text-align: center;
        }

        .stat-val {
            display: block;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.1em;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        #searchBar {
            flex: 1;
            min-width: 200px;
            background: transparent;
            border: 1px solid var(--border);
            padding: 10px 15px;
            border-radius: 4px;
            color: var(--text-main);
            outline: none;
            font-size: 0.9rem;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .action-btn:hover {
            border-color: var(--text-main);
        }

        /* MCQ Card */
        .question-card {
            margin-bottom: 4rem;
        }

        .question-text {
            font-size: 1rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .options-grid {
            display: grid;
            gap: 8px;
        }

        .option {
            background: transparent;
            border: 1px solid var(--border);
            padding: 14px 18px;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            width: 100%;
            color: var(--text-main);
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .option:not(.disabled):hover {
            border-color: var(--text-main);
        }

        .option.correct {
            background: var(--accent) !important;
            border-color: var(--accent) !important;
            color: var(--accent-inverse) !important;
            font-weight: 600;
        }

        .option.wrong {
            border-color: var(--error) !important;
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .option.disabled {
            cursor: default;
            pointer-events: none;
        }

        .review-banner {
            border-left: 2px solid var(--text-main);
            padding: 10px 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            display: none;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.2rem; }
            .stats-bar { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
                <i class="fas fa-moon"></i>
            </button>
            <h1>ETI Final</h1>
            <div class="unit-nav" id="unitNav">
                <button class="unit-btn active" onclick="switchUnit(1)">UNIT 01</button>
                <button class="unit-btn" onclick="switchUnit(2)">UNIT 02</button>
                <button class="unit-btn" onclick="switchUnit(3)">UNIT 03</button>
                <button class="unit-btn" onclick="switchUnit(4)">UNIT 04</button>
                <button class="unit-btn" onclick="switchUnit(5)">UNIT 05</button>
            </div>
        </header>

        <div class="stats-bar">
            <div class="stat-card">
                <span class="stat-val" id="scoreVal">0</span>
                <span class="stat-label">Correct</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="progressVal">0%</span>
                <span class="stat-label">Completion</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="countVal">0 / 0</span>
                <span class="stat-label">Items</span>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="searchBar" placeholder="Filter questions..." oninput="renderQuestions()">
            <button class="action-btn" onclick="shuffleCurrentUnit()">
                <i class="fas fa-shuffle"></i>
            </button>
            <button class="action-btn" onclick="resetUnit()">
                <i class="fas fa-rotate-left"></i>
            </button>
            <button class="action-btn" id="reviewBtn" onclick="toggleReviewMode()">
                <i class="fas fa-eye"></i> Review
            </button>
        </div>

        <div id="reviewBanner" class="review-banner">
            Mode: Analysis (Displaying correct paths)
        </div>

        <div id="quizContainer">
            <!-- Dynamic Content -->
        </div>
    </div>

        /* QUIZ LOGIC SECTION */
        let currentUnit = 1;
        let isReviewMode = false;
        let userProgress = JSON.parse(localStorage.getItem('eti_progress')) || {};
        let isDarkMode = localStorage.getItem('eti_theme') !== 'light';

        function initTheme() {
            if (!isDarkMode) document.body.classList.add('light-mode');
            updateThemeIcon();
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode');
            localStorage.setItem('eti_theme', isDarkMode ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('themeBtn').querySelector('i');
            icon.className = isDarkMode ? 'fas fa-moon' : 'fas fa-sun';
        }

        function getActiveQuestions() {
            const units = [unit1Questions, unit2Questions, unit3Questions, unit4Questions, unit5Questions];
            return units[currentUnit - 1] || [];
        }

        function switchUnit(unit) {
            currentUnit = unit;
            isReviewMode = false;
            document.querySelectorAll('.unit-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', (idx + 1) === unit);
            });
            document.getElementById('reviewBanner').style.display = 'none';
            document.getElementById('searchBar').value = '';
            renderQuestions();
        }

        function shuffleCurrentUnit() {
            const questions = getActiveQuestions();
            for (let i = questions.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [questions[i], questions[j]] = [questions[j], questions[i]];
            }
            renderQuestions();
        }

        function toggleReviewMode() {
            isReviewMode = !isReviewMode;
            document.getElementById('reviewBanner').style.display = isReviewMode ? 'block' : 'none';
            renderQuestions();
        }

        function resetUnit() {
            if(confirm("Reset unit progress?")) {
                const questions = getActiveQuestions();
                questions.forEach((_, index) => {
                    delete userProgress[`u${currentUnit}_q${index}`];
                });
                saveProgress();
                renderQuestions();
            }
        }

        function handleAnswer(qIndex, selectedIdx) {
            if (isReviewMode) return;
            const key = `u${currentUnit}_q${qIndex}`;
            if (userProgress[key] !== undefined) return;
            userProgress[key] = selectedIdx;
            saveProgress();
            renderQuestions();
        }

        function saveProgress() {
            localStorage.setItem('eti_progress', JSON.stringify(userProgress));
        }

        function renderQuestions() {
            const container = document.getElementById('quizContainer');
            const searchTerm = document.getElementById('searchBar').value.toLowerCase();
            const questions = getActiveQuestions();
            
            container.innerHTML = '';
            let answeredCount = 0;
            let score = 0;

            questions.forEach((q, index) => {
                const key = `u${currentUnit}_q${index}`;
                const userAns = userProgress[key];
                const isAnswered = userAns !== undefined;

                if (isAnswered) {
                    answeredCount++;
                    if (userAns === q.answer) score++;
                }

                if (searchTerm && !q.question.toLowerCase().includes(searchTerm)) return;

                const card = document.createElement('div');
                card.className = 'question-card';
                
                let optionsHtml = '';
                q.options.forEach((opt, optIdx) => {
                    let statusClass = '';
                    let icon = '';
                    
                    if (isReviewMode) {
                        if (optIdx === q.answer) statusClass = 'correct';
                    } else if (isAnswered) {
                        if (optIdx === q.answer) {
                            statusClass = 'correct';
                        } else if (optIdx === userAns) {
                            statusClass = 'wrong';
                        }
                    }

                    optionsHtml += `
                        <button class="option ${statusClass} ${isAnswered || isReviewMode ? 'disabled' : ''}" 
                                onclick="handleAnswer(${index}, ${optIdx})">
                            <span>${opt}</span>
                            ${statusClass === 'correct' ? '<i class="fas fa-check"></i>' : ''}
                        </button>
                    `;
                });

                card.innerHTML = `
                    <div class="question-text">${q.question}</div>
                    <div class="options-grid">${optionsHtml}</div>
                `;
                container.appendChild(card);
            });

            document.getElementById('scoreVal').innerText = score;
            document.getElementById('countVal').innerText = `${answeredCount} / ${questions.length}`;
            document.getElementById('progressVal').innerText = questions.length === 0 ? '0%' : Math.round((answeredCount / questions.length) * 100) + '%';
        }

        initTheme();
        renderQuestions();
    </script>
